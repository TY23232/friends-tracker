<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Find My Parent</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <div class="auth-container blue-theme">
    <div class="auth-card">
      <div class="logo">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#2196F3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <h1>Find My Parent</h1>
        <p>Stay connected with your family</p>
      </div>

      <div id="loginForm">
        <div class="form-group">
          <label for="loginName">Name</label>
          <input type="text" id="loginName" placeholder="e.g. John" required>
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" required>
        </div>
        <button onclick="handleLogin()" class="btn-primary blue-btn">Sign In</button>
        <p class="auth-switch">
          Don't have an account? <a href="/register.html">Create new account</a>
        </p>
      </div>

      <div id="errorMsg" class="error-msg" style="display:none"></div>
    </div>
  </div>

  <script>
    const API = window.location.origin;

    async function handleLogin() {
      const name = document.getElementById('loginName').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errorEl = document.getElementById('errorMsg');
      errorEl.style.display = 'none';

      if (!name || !password) {
        errorEl.textContent = 'Please enter your name and password';
        errorEl.style.display = 'block';
        return;
      }

      try {
        const res = await fetch(`${API}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/dashboard.html';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      }
    }
  </script>
</body>
</html>
